# SKDW Arena — app อย่างเดียว (Next.js :3017)
# DB ใช้ postgres-core ที่มีอยู่แล้วบน network "school-net" (ไม่สร้าง container db เอง)
# รัน:  docker compose up -d --build
services:
  app:
    build:
      context: .
      args:
        # basePath ถูก bake ตอน next build (ดู next.config.ts) — ต้องส่งเป็น build arg
        # ไม่ตั้งเลย = /arena (prod หลัง reverse proxy) ; ตั้ง BASE_PATH= (ค่าว่าง) = เสิร์ฟที่ root
        # ใช้ ${VAR-default} ไม่ใช่ :- เพื่อให้ค่าว่างที่ตั้งใจตั้งมีผลจริง
        # (Dockerfile bake ค่านี้เป็น ENV ใน runner ด้วย เพื่อให้ build/runtime ตรงกัน)
        BASE_PATH: ${BASE_PATH-/arena}
    container_name: arena-app
    environment:
      NODE_ENV: production
      PORT: "3017"
      TZ: Asia/Bangkok
      # ในเน็ตเวิร์ก school-net เรียก postgres-core ด้วยชื่อ service (พอร์ตภายใน 5432)
      # — override ค่า DATABASE_URL ใน .env ที่ใช้ตอน dev บน host
      # :? = ถ้าไม่ได้ตั้งใน .env compose จะหยุดพร้อมบอกเหตุผลตั้งแต่ต้น
      # ดีกว่าปล่อยให้ container สตาร์ตด้วยค่าว่างแล้วไปพังตอนมีคนใช้งาน
      DATABASE_URL: postgres://${ARENA_DB_USER:-arena}:${ARENA_DB_PASSWORD:?ต้องตั้ง ARENA_DB_PASSWORD ใน Portainer stack env}@${ARENA_DB_HOST:-postgres-core}:${ARENA_DB_PORT:-5432}/${ARENA_DB_NAME:-arena}
      JWT_SECRET: ${JWT_SECRET:?ต้องตั้ง JWT_SECRET ใน Portainer stack env (สุ่มยาว ๆ เช่น openssl rand -hex 32)}
      # ค่าเหล่านี้เดิมเข้าคอนเทนเนอร์ผ่าน env_file แต่ Portainer/Git ไม่มีไฟล์ .env บนดิสก์
      # จึงต้องดึงผ่าน ${...} จาก stack env ตรง ๆ (ไม่งั้น entrypoint เช็ค SCHOOLOS_API_KEY ว่างแล้ว exit 1)
      SCHOOLOS_API_BASE: ${SCHOOLOS_API_BASE:-http://192.168.200.56:3002}
      SCHOOLOS_API_KEY: ${SCHOOLOS_API_KEY:?ต้องตั้ง SCHOOLOS_API_KEY ใน Portainer stack env}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # ไม่มี env admin แล้ว — สิทธิ์ admin มาจาก role "teacher-admin" ของ SchoolOS โดยตรง
      # (ครูที่ SchoolOS กำหนดเป็น teacher-admin ล็อกอินเข้าเป็น admin ของระบบเอง)
    ports:
      - "3017:3017"
    networks:
      - school-net
    restart: unless-stopped

networks:
  school-net:
    external: true # สร้างไว้แล้วโดยสแตก postgres-core
