# SKDW Arena — สแตกเดียว: Next.js (3017) + PostgreSQL (5017)
# รัน:  docker compose up -d --build
services:
  db:
    image: postgres:16-alpine
    container_name: arena-db
    # ค่า user/pass/db อ่านจาก .env (ไม่ hardcode รหัสไว้ในไฟล์ที่ commit)
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Bangkok
    ports:
      - "5017:5432" # host 5017 → container 5432
    volumes:
      - arena_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    container_name: arena-app
    depends_on:
      db:
        condition: service_healthy # รอ Postgres พร้อมก่อนค่อย push/seed/start
    env_file:
      - .env # โหลด JWT_SECRET, SCHOOLOS_API_* ฯลฯ จาก .env
    environment:
      NODE_ENV: production
      PORT: "3017"
      TZ: Asia/Bangkok
      # ชี้ไปที่ service db ภายในเน็ตเวิร์ก compose (พอร์ตภายในคือ 5432) — override ค่าใน .env
      # รหัส/ชื่อ DB อ่านจาก .env เพื่อไม่ hardcode ไว้ในไฟล์ที่ commit
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "3017:3017"
    restart: unless-stopped

volumes:
  arena_pgdata:
